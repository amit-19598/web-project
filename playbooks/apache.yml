- name: Install Apache httpd on RHEL 10 (skip GPG)
  hosts: webservers
  become: true

  tasks:
    - name: Update package cache
      dnf:
        update_cache: yes
        skip_broken: yes

    - name: Install httpd
      dnf:
        name: httpd
        state: present
        validate_certs: yes
        installroot: /
        disable_gpg_check: yes

    - name: Start and enable httpd
      service:
        name: httpd
        state: started
        enabled: true
